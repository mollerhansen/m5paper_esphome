# --- I2C BUS ---
i2c:
  id: bus_a
  sda: GPIO21
  scl: GPIO22
  frequency: 10kHz # Ultra langsomt og stabilt
  scan: false      # Vi gør det manuelt herunder

# --- RADAR SCANNER ---
interval:
  - interval: 5s
    then:
      - lambda: |-
          ESP_LOGI("scanner", "--- STARTER I2C SCANNING ---");
          bool found_any = false;
          
          // Scan alle adresser fra 1 til 127
          for (uint8_t address = 1; address < 127; address++) {
            // Vi sender en "tom" besked. Hvis enheden svarer med ACK, findes den.
            if (id(bus_a).write(address, nullptr, 0) == i2c::ERROR_OK) {
              ESP_LOGI("scanner", ">>> FUNDET ENHED PÅ ADRESSE: 0x%02X <<<", address);
              found_any = true;
            }
          }
          
          if (!found_any) {
            ESP_LOGI("scanner", "Ingen enheder fundet (Bussen er tom/død)");
          } else {
            ESP_LOGI("scanner", "--- SCANNING SLUT (Succes!) ---");
          }