esphome:
  name: stue-panel
  friendly_name: Stue Panel
  
  platformio_options:
    build_flags:
      - -DBOARD_HAS_PSRAM
      - -mfix-esp32-psram-cache-issue

  on_boot:
    - priority: -100.0 
      then:
        - delay: 2s
        # 1. FIX: Rens skærmen helt (blinker sort/hvid) før vi tegner, så det bliver knivskarpt!
        - it8951e.clear: m5paper_display
        - delay: 500ms
        - component.update: m5paper_display

esp32:
  board: m5stack_paper
  framework:
    type: arduino

external_components:
  - source: custom_components 

logger:
  level: INFO
  logs:
    i2c_master: NONE 

api:
  id: ha_api
  encryption:
    key: "N2YxMzRhYzY4YjVkMzU1ZTQ5Mzg3MmExOTI4MzY0ZGU="

ota:
  platform: esphome
  password: "HansenHansen"

wifi:
  ssid: "Yellow Submarine"
  password: "Hansen28102017"
  power_save_mode: NONE 

globals:
  - id: use_24h_format
    type: bool
    restore_value: no
    initial_value: 'true'

psram:

# --- I2C BUS ---
i2c:
  id: bus_a
  sda: GPIO21
  scl: GPIO22
  frequency: 100kHz
  scan: false

# --- SPI BUS ---
spi:
  clk_pin: GPIO14
  mosi_pin: GPIO12
  miso_pin: GPIO13

# --- FONTS ---
font:
  - file: "FreeSans.ttf"
    id: font_small
    size: 16
  - file: "FreeSans.ttf"
    id: font_large
    size: 48

# --- TIME ---
time:
  - platform: homeassistant
    id: ha_time
    on_time_sync: 
      - bm8563.write_time
  - platform: bm8563
    id: rtc_time

# --- SENSORS ---
sensor:
  - platform: uptime
    name: "Panel Uptime"

# --- M5PAPER STRØMSTYRING ---
m5paper:
  main_power_pin: GPIO2
  battery_power_pin: GPIO5

# --- DISPLAY ---
display:
  - platform: it8951e
    id: m5paper_display
    cs_pin: GPIO15
    reset_pin: GPIO23
    busy_pin: GPIO27
    rotation: 90
    update_interval: never
    lambda: |-
      // Vi bruger standard-variabler for at sikre kridhvid og kulsort!
      it.fill(COLOR_OFF); 
      auto time = id(rtc_time).now();
      
      if (id(use_24h_format)) {
        it.strftime(270, 270, id(font_large), COLOR_ON, TextAlign::CENTER, "%H:%M", time);
        it.print(270, 350, id(font_small), COLOR_ON, TextAlign::CENTER, "24h Format");
      } else {
        it.strftime(270, 270, id(font_large), COLOR_ON, TextAlign::CENTER, "%I:%M %p", time);
        it.print(270, 350, id(font_small), COLOR_ON, TextAlign::CENTER, "AM/PM Format");
      }
      it.print(270, 500, id(font_small), COLOR_ON, TextAlign::CENTER, "Touch to toggle");

# --- SCRIPTS (Sikrer at vi ikke dobbelt-klikker) ---
script:
  - id: debounce_touch
    mode: single # Ignorerer alle nye tryk, indtil scriptet er færdigt
    then:
      - lambda: |-
          ESP_LOGI("touch", ">>> Format skiftet! <<<");
          id(use_24h_format) = !id(use_24h_format);
      - component.update: m5paper_display
      - delay: 1s # 1 sekunds cooldown før den lytter efter tryk igen

# --- TOUCHSCREEN ---
touchscreen:
  - platform: gt911
    display: m5paper_display
    id: gt911_touchscreen
    address: 0x5D
    interrupt_pin: GPIO36
    update_interval: 50ms 
    on_touch:
      - script.execute: debounce_touch