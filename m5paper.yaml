esphome:
  name: stue-panel
  friendly_name: Stue Panel
  
  platformio_options:
    build_flags:
      - -DBOARD_HAS_PSRAM
      - -mfix-esp32-psram-cache-issue
  
  on_boot:
    - priority: 600.0 
      then:
        - lambda: |-
            // 1. TÆND FOR ALT STRØM PÅ BOARDET
            pinMode(2, OUTPUT);
            digitalWrite(2, HIGH); // Main Power ON
            pinMode(5, OUTPUT);
            digitalWrite(5, HIGH); // Battery/Peripheral Power ON
            delay(500); // Vent på at strømmen stabiliseres

            // 2. HÅRDT RESET AF SKÆRM OG TOUCH
            pinMode(23, OUTPUT);
            digitalWrite(23, LOW);
            delay(50);
            digitalWrite(23, HIGH);
            delay(500);

